<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이트 신청</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe6e6; /* 사랑스러운 핑크 배경 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            overflow: hidden; /* 버튼이 화면 밖으로 나갈 때 스크롤바 생기는 것 방지 */
        }
        h1 {
            color: #ff4d4d;
            font-size: 1.8rem;
            margin-bottom: 20px;
            padding: 0 20px;
        }
        .gif-container img {
            width: 250px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .buttons {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
        }
        button {
            font-size: 1.2rem;
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s;
        }
        #yesBtn {
            background-color: #ff4d4d;
            color: white;
        }
        #yesBtn:hover {
            background-color: #ff3333;
            transform: scale(1.05); /* 마우스 올리면 살짝 커지는 효과 */
        }
        #noBtn {
            background-color: #ffffff;
            color: #333;
            transition: left 0.2s ease, top 0.2s ease; /* 부드럽게 도망가도록 애니메이션 부여 */
        }
    </style>
</head>
<body>

    <div class="gif-container">
        <!-- 애절하게 부탁하는 귀여운 고양이 GIF -->
        <img id="mainGif" src="https://media.tenor.com/efioP1eA_20AAAAi/peach-and-goma-peach-goma.gif" alt="부탁하는 고양이">
    </div>

    <h1 id="question">이번 주말에 나랑 데이트 할래?</h1>

    <div class="buttons" id="btnContainer">
        <button id="yesBtn" onclick="acceptDate()">응! 좋아 ❤️</button>
        <!-- 마우스가 올라가거나, 터치하려는 순간 moveButton 함수 실행 -->
        <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">아니 싫어</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const question = document.getElementById('question');
        const mainGif = document.getElementById('mainGif');
        
        function moveButton() {
            // 버튼을 fixed로 변경하여 화면 전체를 기준으로 자유롭게 움직이게 함
            noBtn.style.position = 'fixed';
            
            // 화면 밖으로 버튼이 나가지 않게 최대 X, Y 좌표 계산
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            
            // 안전 구역 안에서 랜덤 좌표 생성
            const x = Math.max(0, Math.random() * maxX);
            const y = Math.max(0, Math.random() * maxY);
            
            // 버튼을 새 위치로 이동
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        function acceptDate() {
            question.innerText = "야호! 주말에 보자 ❤️";
            // 수락하면 기뻐하는 고양이 GIF로 변경
            mainGif.src = "https://media.tenor.com/z4_y9-W4qGgAAAAi/peach-goma.gif";
            yesBtn.style.display = 'none';
            noBtn.style.display = 'none';
            
            // 축하 폭죽 파티콩 효과 실행
            createConfetti();
        }

        function createConfetti() {
            const colors = ['#ff4d4d', '#ffcc00', '#66ff66', '#33ccff', '#ff66b2'];
            for(let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = Math.random() * 10 + 5 + 'px';
                confetti.style.height = Math.random() * 10 + 5 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-20px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.zIndex = '1000';
                document.body.appendChild(confetti);

                const fallDuration = Math.random() * 3 + 2;
                confetti.style.transition = `top ${fallDuration}s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity ${fallDuration}s ease-in`;
                
                setTimeout(() => {
                    confetti.style.top = window.innerHeight + 'px';
                    confetti.style.opacity = '0';
                }, 50);

                setTimeout(() => {
                    confetti.remove();
                }, fallDuration * 1000 + 50);
            }
        }
    </script>
</body>
</html>
