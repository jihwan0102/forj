<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>지우야만나자</title>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(-45deg, #0a0a0a, #1a1a1a, #2a2a2a, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            text-align: center;
            overflow: hidden; 
            padding: 20px;
            color: #ffffff; 
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(40, 40, 40, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 40px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .step { display: none; width: 100%; }
        .step.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            color: #ffffff; 
            font-size: 1.5rem; 
            font-weight: 700;
            margin-top: 0; 
            margin-bottom: 25px; 
            word-break: keep-all; 
            line-height: 1.4;
        }

        .emoji-container {
            font-size: 110px;
            line-height: 1.2;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .btn-container { display: flex; gap: 15px; width: 100%; justify-content: center; margin-top: 10px; position: relative; }
        
        button {
            font-size: 1.1rem; padding: 14px 28px; border: none; border-radius: 30px;
            cursor: pointer; font-weight: 700; 
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        
        #yesBtn, #noBtn, .btn-next { 
            background: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            color: #000000; 
            box-shadow: 0 8px 20px rgba(255, 255, 255, 0.15);
        }
        .btn-next { width: 100%; margin-top: 30px; }
        #yesBtn:active, #noBtn:active, .btn-next:active { transform: scale(0.95); box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1); }
        
        #noBtn { 
            transition: left 0.1s, top 0.1s, transform 0.1s ease, box-shadow 0.1s ease; 
            z-index: 100;
        }

        .options-grid { display: flex; flex-direction: column; gap: 14px; width: 100%; }
        .option-label {
            display: block; padding: 16px; 
            background: rgba(0, 0, 0, 0.4); 
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 18px; cursor: pointer; font-weight: 600; font-size: 1.05rem;
            transition: all 0.25s ease; text-align: center; color: #cccccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        input[type="checkbox"], input[type="radio"] { display: none; }
        
        input[type="checkbox"]:checked + .option-label,
        input[type="radio"]:checked + .option-label {
            background-color: rgba(255, 255, 255, 0.15); 
            border-color: #ffffff; 
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <form id="dateForm" style="width: 100%;">
            
            <div class="step active" id="step1">
                <div class="emoji-container">🥺</div>
                <h1>지우야 8월에 만나자</h1>
                <div class="btn-container">
                    <button type="button" id="yesBtn" onclick="nextStep(2)">좋아!</button>
                    <button type="button" id="noBtn" onmouseover="moveButton(event)" ontouchstart="moveButton(event)">아니 싫어</button>
                </div>
            </div>

            <div class="step" id="step2">
                <div class="emoji-container">😍</div>
                <h1>언제언제 시간돼?<br><span style="font-size: 0.95rem; font-weight: 500; color: #aaaaaa;">(복수선택 가능)</span></h1>
                <div class="options-grid">
                    <input type="checkbox" id="date1" name="날짜" value="8월 6~7일">
                    <label class="option-label" for="date1">8월 6 ~ 7일</label>
                    
                    <input type="checkbox" id="date2" name="날짜" value="8월 13~14일">
                    <label class="option-label" for="date2">8월 13 ~ 14일</label>
                    
                    <input type="checkbox" id="date3" name="날짜" value="8월 20~21일">
                    <label class="option-label" for="date3">8월 20 ~ 21일</label>
                    
                    <input type="checkbox" id="date4" name="날짜" value="8월 27~28일">
                    <label class="option-label" for="date4">8월 27 ~ 28일</label>
                </div>
                <button type="button" class="btn-next" onclick="nextStep(3)">다음으로</button>
            </div>

            <div class="step" id="step3">
                <div class="emoji-container">🤔</div>
                <h1>어디갈까?</h1>
                <div class="options-grid">
                    <input type="radio" id="loc1" name="장소" value="서울에 있기">
                    <label class="option-label" for="loc1">서울에 있기</label>
                    
                    <input type="radio" id="loc2" name="장소" value="어디론가 여행가기">
                    <label class="option-label" for="loc2">어디론가 여행가기</label>
                </div>
                <button type="button" class="btn-next" onclick="submitAndFinal()">선택 완료</button>
            </div>

            <div class="step" id="step4">
                <div class="emoji-container">🎉</div>
                <h1 id="finalMsg">답변이 전송 중입니다...</h1>
            </div>

        </form>
    </div>

    <script>
        const FORMSPREE_URL = "https://formspree.io/f/xeebdvjn";

        function nextStep(stepNum) {
            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById(`step${stepNum}`).classList.add('active');
        }

        let isFirstMove = true;

        function moveButton(event) {
            if(event && event.type !== 'click') {
                event.preventDefault();
            }

            const noBtn = document.getElementById('noBtn');
            
            if (isFirstMove) {
                const ghostBox = document.createElement('div');
                ghostBox.style.width = noBtn.offsetWidth + 'px';
                ghostBox.style.height = noBtn.offsetHeight + 'px';
                ghostBox.style.flexShrink = '0';
                noBtn.parentNode.insertBefore(ghostBox, noBtn);
                isFirstMove = false;
            }

            noBtn.style.position = 'fixed';
            
            // 화면 밖으로 안 나가게 안전 여백을 더 타이트하게 재조정
            const safeMarginX = 40; // 좌우 여백
            const safeMarginTop = 80; // 상단 여백
            const safeMarginBottom = 160; // 하단 여백 (밑으로 내려가지 않게 대폭 상향)
            
            const viewportWidth = document.documentElement.clientWidth;
            const viewportHeight = document.documentElement.clientHeight;
            
            // 버튼이 위치할 수 있는 최소~최대 좌표 계산식 명확화
            const minX = safeMarginX;
            const maxX = viewportWidth - noBtn.offsetWidth - safeMarginX;
            
            const minY = safeMarginTop;
            const maxY = viewportHeight - noBtn.offsetHeight - safeMarginBottom;
            
            // 정해진 구역 안에서만 랜덤 이동
            const x = minX + Math.random() * (maxX - minX);
            const y = minY + Math.random() * (maxY - minY);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        async function submitAndFinal() {
            nextStep(4);
            
            const form = document.getElementById('dateForm');
            const formData = new FormData(form);
            const finalMsg = document.getElementById('finalMsg');

            try {
                const response = await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });
                
                if (response.ok) {
                    finalMsg.innerHTML = "답변 전달 완료~<br>연락할게 지우야";
                    createConfetti();
                } else {
                    finalMsg.innerText = "전송에 실패했어요 ㅠ_ㅠ 따로 카톡해줘!";
                }
            } catch (error) {
                finalMsg.innerText = "네트워크 오류 발생! 따로 카톡해줘!";
            }
        }

        function createConfetti() {
            const colors = ['#FFD700', '#C0C0C0', '#ffffff', '#e0e0e0', '#f5f5f5'];
            for(let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = Math.random() * 8 + 6 + 'px';
                confetti.style.height = Math.random() * 8 + 6 + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * window.innerWidth + 'px';
                confetti.style.top = '-20px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '4px';
                confetti.style.zIndex = '1000';
                confetti.style.boxShadow = '0 2px 5px rgba(0,0,0,0.5)';
                document.body.appendChild(confetti);

                const fallDuration = Math.random() * 2 + 2.5;
                confetti.style.transition = `top ${fallDuration}s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity ${fallDuration}s ease-in, transform ${fallDuration}s linear`;
                
                const rotation = Math.random() * 360;
                confetti.style.transform = `rotate(${rotation}deg)`;

                setTimeout(() => {
                    confetti.style.top = window.innerHeight + 'px';
                    confetti.style.opacity = '0';
                    confetti.style.transform = `rotate(${rotation + 360}deg)`;
                }, 50);

                setTimeout(() => confetti.remove(), fallDuration * 1000 + 50);
            }
        }
    </script>
</body>
</html>
